# This is a Databricks asset bundle definition for first_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: first_bundle
  uuid: b61149bd-e607-4cf9-91f1-683a66fe1e97

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-760e4c37-d0a0.cloud.databricks.com
    variables:
      catalog: ci_cd_bundle_dev
      schema: demo_schema
  prod:
    mode: production
    workspace:
      host: https://dbc-760e4c37-d0a0.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/masoud_aghayan200@yahoo.com to make sure we only have a single copy.
      root_path: /Workspace/Users/masoud_aghayan200@yahoo.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ci_cd_bundle_dev
      schema: demo_schema
    permissions:
      - user_name: masoud_aghayan200@yahoo.com
        level: CAN_MANAGE
