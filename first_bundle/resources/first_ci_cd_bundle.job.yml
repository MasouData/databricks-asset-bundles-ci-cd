# A sample job for first_bundle.

resources:
  jobs:
    first_ci_cd_bundle:
      name: first_ci_cd_bundle

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: customer
          notebook_task:
            notebook_path: ../src/customer.ipynb
            # base_parameters:
            #   catalog: ci_cd_bundle_dev
            #   schema: demo_schema
        - task_key: transaction
          depends_on:
            - task_key: customer
          notebook_task:
            notebook_path: ../src/transaction.ipynb
            # base_parameters:
            #   catalog: ci_cd_bundle_dev
            #   schema: demo_schema

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
